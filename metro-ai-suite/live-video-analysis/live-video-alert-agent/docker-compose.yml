name: ${PROJECT_NAME:-live-video-alert}
services:
  ovms-init:
    image: busybox:latest
    container_name: ovms-init
    user: "0:0"
    volumes:
      - ovms-models:/models
    command: sh -c "chown -R 5000:5000 /models && chmod -R 755 /models"

  ovms-config:
    image: busybox:latest
    container_name: ovms-config
    user: "0:0"
    depends_on:
      ovms-init:
        condition: service_completed_successfully
    volumes:
      - ovms-models:/models
    command:
      - sh
      - -c
      - |
        cat >/models/config_all.json <<EOF
        {
          "model_config_list": [
            {
              "config": {
                "name": "${MODEL_NAME:-Phi-3.5-Vision}",
                "source_model": "${OVMS_VLM_SOURCE_MODEL:-OpenVINO/Phi-3.5-vision-instruct-int4-ov}",
                "target_device": "${OVMS_TARGET_DEVICE:-CPU}"
              }
            },
            {
              "config": {
                "name": "${LOCAL_LLM_MODEL:-Phi-4-mini-instruct}",
                "source_model": "${OVMS_LLM_SOURCE_MODEL:-OpenVINO/Phi-4-mini-instruct-int4-ov}",
                "target_device": "${OVMS_TARGET_DEVICE:-CPU}"
              }
            }
          ]
        }
        EOF
        chown 5000:5000 /models/config_all.json
        chmod 644 /models/config_all.json

  ovms:
    image: openvino/model_server:2026.0
    container_name: ovms-vlm
    user: "5000:5000" 
    restart: unless-stopped
    depends_on:
      ovms-config:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      - no_proxy=${no_proxy},localhost
      - NO_PROXY=${no_proxy},localhost
      - http_proxy=${http_proxy}
      - HTTP_PROXY=${http_proxy}
      - https_proxy=${https_proxy}
      - HTTPS_PROXY=${https_proxy}
      - HF_TOKEN=${HF_TOKEN}
      - OVMS_VLM_SOURCE_MODEL=${OVMS_VLM_SOURCE_MODEL:-OpenVINO/Phi-3.5-vision-instruct-int4-ov}
      - OVMS_LLM_SOURCE_MODEL=${OVMS_LLM_SOURCE_MODEL:-OpenVINO/Phi-4-mini-instruct-int4-ov}
      - OVMS_TARGET_DEVICE=${OVMS_TARGET_DEVICE:-CPU}
      - MODEL_NAME=${MODEL_NAME:-Phi-3.5-Vision}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-Phi-4-mini-instruct}
    volumes:
      - ovms-models:/models
    command:
      - --rest_port
      - "8000"
      - --source_model
      - "${OVMS_SOURCE_MODEL:-OpenVINO/Phi-3.5-vision-instruct-int4-ov}"
      - --model_repository_path
      - "/models"
      - --model_name
      - "${MODEL_NAME:-Phi-3.5-Vision}"
      - --task
      - "text_generation"
      - --pipeline_type
      - "VLM"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s

  live-video-alert:
    image: ${REGISTRY:-}live-video-alert:${TAG:-latest}
    build: .
    container_name: live-video-alert
    restart: unless-stopped
    ports:
      - "${PORT:-9000}:${PORT:-9000}"
    environment:
      # ---- proxy ----
      - no_proxy=${no_proxy}
      - NO_PROXY=${no_proxy}
      - http_proxy=${http_proxy}
      - HTTP_PROXY=${http_proxy}
      - https_proxy=${https_proxy}
      - HTTPS_PROXY=${https_proxy}

      # ---- core ----
      - PORT=${PORT:-9000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RTSP_URL=${RTSP_URL}

      # ---- VLM / OVMS ----
      - VLM_URL=${VLM_URL:-http://ovms:8000/v3}
      - VLM_API_KEY=${VLM_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-Phi-3.5-Vision}
      - VLM_IMAGE_MAX_DIM=${VLM_IMAGE_MAX_DIM:-448}
      - VLM_JPEG_QUALITY=${VLM_JPEG_QUALITY:-70}
      - VLM_TIMEOUT=${VLM_TIMEOUT:-30}
      - VLM_MAX_RETRIES=${VLM_MAX_RETRIES:-2}
      - VLM_MAX_TOKENS=${VLM_MAX_TOKENS:-800}

      # ---- stream capture ----
      - ANALYSIS_INTERVAL=${ANALYSIS_INTERVAL:-5}
      - CAPTURE_FPS=${CAPTURE_FPS:-0}
      - CAPTURE_RESIZE_HEIGHT=${CAPTURE_RESIZE_HEIGHT:-720}

      # ---- API auth (leave empty to disable) ----
      - API_KEY=${API_KEY:-}

      # ---- Google ADK (optional; USE_ADK takes precedence over USE_LOCAL_LLM) ----
      - USE_ADK=${USE_ADK:-true}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ADK_MODEL=${ADK_MODEL:-gemini-2.0-flash-lite}
      - ADK_USE_LOCAL_LLM=${ADK_USE_LOCAL_LLM:-true}

      # ---- Local LLM (optional; defaults to OVMS text model endpoint) ----
      - USE_LOCAL_LLM=${USE_LOCAL_LLM:-true}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-http://ovms:8000/v3}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-Phi-4-mini-instruct}
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY:-local}
      - LOCAL_LLM_TIMEOUT=${LOCAL_LLM_TIMEOUT:-30}

      # ---- alert history ----
      - ALERT_HISTORY_SIZE=${ALERT_HISTORY_SIZE:-500}

      # ---- snapshot tool ----
      - SNAPSHOT_DIR=/app/snapshots

      # ---- email action tool (optional) ----
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}

      # ---- webhook action tool (optional) ----
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}

      # ---- MQTT action tool (optional) ----
      - MQTT_BROKER=${MQTT_BROKER:-}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_BASE_TOPIC=${MQTT_BASE_TOPIC:-alerts/live-video}

    volumes:
      - ./resources:/app/resources
      # Persist alert snapshots across container restarts
      - snapshots:/app/snapshots

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${PORT:-9000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    depends_on:
      ovms:
        condition: service_healthy

volumes:
  ovms-models:
  # Named volume for alert snapshot images
  snapshots:
